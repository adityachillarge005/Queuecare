{% extends "base.html" %}

{% block title %}Edit Patient Record - QueueCare{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 border-bottom d-flex align-items-center gap-2">
                <a href="{% url 'view_patient' %}" class="btn btn-sm btn-outline-secondary py-1 px-2">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h5 class="mb-0 fw-bold text-dark">Edit Patient Profile</h5>
            </div>
            
            <div class="card-body p-4">
                <form method="POST" action="{% url 'edit_patient' patient.id %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold text-secondary small">Full Name</label>
                        <input type="text" class="form-control bg-light py-2" id="name" name="name" value="{{ patient.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label fw-semibold text-secondary small">Phone Number</label>
                        <input type="tel" class="form-control bg-light py-2" id="phone" name="phone" value="{{ patient.phone }}" maxlength="10" pattern="[0-9]{10}" required>
                        <div class="form-text small text-muted">Must be exactly 10 digits without country code.</div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="date_of_birth" class="form-label fw-semibold text-secondary small">Date of Birth</label>
                            <input type="date" class="form-control bg-light py-2" id="date_of_birth" name="date_of_birth" value="{{ patient.date_of_birth|date:'Y-m-d' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="gender" class="form-label fw-semibold text-secondary small">Gender</label>
                            <select class="form-select bg-light py-2" id="gender" name="gender" required>
                                <option value="Male" {% if patient.gender == "Male" %}selected{% endif %}>Male</option>
                                <option value="Female" {% if patient.gender == "Female" %}selected{% endif %}>Female</option>
                                <option value="Other" {% if patient.gender == "Other" %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2.5 fw-semibold shadow-sm">
                        <i class="bi bi-check-circle me-1"></i> Update Patient Record
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
